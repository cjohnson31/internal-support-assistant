# ── Cross-topic ────────────────────────────────────────────────────

- id: cross-001
  question: "What are the four roles in Atlas and what can each one do?"
  key_facts:
    - "Viewer: read-only"
    - "Developer: create service accounts, deploy to staging"
    - "Team Lead: approve access requests, deploy to production"
    - "Admin: full access"
  expected_source_ids: ["getting-started"]
  should_refuse: false

