services:
  assistant:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env
    volumes:
      # Persist the vector store between restarts
      - chroma_data:/app/.chroma
    # Ingest docs on first run, then start the Slack bot
    command: >
      sh -c "python -m src.cli ingest && python -m src.slack"
    restart: unless-stopped

volumes:
  chroma_data:
