services:
  # Default: web UI (no API key or Slack setup needed)
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/app/.chroma
    command: >
      sh -c "python -m src.cli ingest && python -m src.web"
    restart: unless-stopped

  # Optional: Slack bot (requires SLACK_BOT_TOKEN and SLACK_APP_TOKEN in .env)
  slack:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env
    volumes:
      - chroma_data:/app/.chroma
    command: >
      sh -c "python -m src.cli ingest && python -m src.slack"
    restart: unless-stopped
    profiles:
      - slack

volumes:
  chroma_data:
